<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahiru Image Gallery</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }
        header { text-align: center; margin-bottom: 40px; }
        header h1 { color: #00adb5; margin-bottom: 5px; }
        header p { color: #888; margin: 0; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #1e1e1e; border-radius: 8px; overflow: hidden; border: 1px solid #2d2d2d; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: #00adb5; }
        .img-container { width: 100%; height: 200px; background: #151515; display: flex; align-items: center; justify-content: center; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 10px; font-size: 12px; color: #aaa; text-align: center; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        #loading { text-align: center; color: #00adb5; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <h1>Mahiru Cloud Storage</h1>
    <p>Daftar gambar yang tersimpan di dalam repository GitHub</p>
    <div id="loading">Memuat galeri...</div>
</header>

<div class="gallery" id="galleryContainer"></div>

<script>
    async function loadGallery() {
        try {
            // Ambil list file lewat API rahasia kita
            const response = await fetch('/api/list');
            const files = await response.json();
            const container = document.getElementById('galleryContainer');
            document.getElementById('loading').style.display = 'none';

            if (!Array.isArray(files) || files.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#555;">Belum ada gambar di folder image, Bre.</p>';
                return;
            }

            // Loop dan tampilin semua gambar
            files.forEach(file => {
                if (file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                    const imageUrl = `/image/${file.name}`;
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => {
                        const fullUrl = window.location.origin + imageUrl;
                        navigator.clipboard.writeText(fullUrl);
                        alert('📋 Link berhasil disalin:\n' + fullUrl);
                    };

                    card.innerHTML = `
                        <div class="img-container">
                            <img src="${imageUrl}" loading="lazy">
                        </div>
                        <div class="info">${file.name}</div>
                    `;
                    container.appendChild(card);
                }
            });
        } catch (err) {
            document.getElementById('loading').innerText = 'Gagal memuat galeri, Bre.';
        }
    }
    loadGallery();
</script>
</body>
</html>
