<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahiru Image Host</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #111; color: #fff; margin: 0; }
        .box { background: #222; padding: 30px; border-radius: 10px; text-align: center; width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input[type="file"] { margin: 20px 0; display: block; width: 100%; }
        button { background: #00adb5; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        .result { margin-top: 20px; display: none; background: #333; padding: 10px; border-radius: 5px; }
        .result input { width: 90%; padding: 8px; text-align: center; background: #000; color: #00adb5; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="box">
    <h3>Mahiru Cloud Uploader</h3>
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="uploadKeVercel()">Generate Link .jpg</button>

    <div class="result" id="resultBox">
        <p>Link Gambar Lo:</p>
        <input type="text" id="linkResult" readonly onclick="this.select()">
    </div>
</div>

<script>
    async function uploadKeVercel() {
        const fileInput = document.getElementById('fileInput');
        const resultBox = document.getElementById('resultBox');
        const linkResult = document.getElementById('linkResult');

        if (fileInput.files.length === 0) return alert('Pilih gambar dulu, Bre!');

        // Ubah gambar jadi Base64 biar bisa dikirim lewat JSON ke serverless Vercel
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.readAsDataURL(file);
        
        linkResult.value = "Sedang memproses...";
        resultBox.style.display = "block";

        reader.onload = async () => {
            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        image: reader.result,
                        filename: file.name
                    })
                });

                const data = await response.json();
                if (data.url) {
                    // Outputnya langsung ke domain mahiru lo dengan ext .jpg/.png
                    linkResult.value = window.location.origin + data.url;
                } else {
                    alert('Gagal upload: ' + data.error);
                }
            } catch (err) {
                alert('Ada error pas upload, Bre.');
            }
        };
    </script>
</body>
</html>
