<!DOCTYPE html>
<html lang="id">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Mahiru Cloud - Uploader</title>
 <style>
 * {
 box-sizing: border-box;
 margin: 0;
 padding: 0;
 font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
 }

 body {
 background-color: #f7f1eb;
 color: #4a3e3d;
 display: flex;
 justify-content: center;
 align-items: center;
 min-height: 100vh;
 padding: 20px 10px;
 }

 /* CONTAINER UTAMA: Lebih bersih, modern, dengan aksen bayangan halus */
 .mobile-container {
 width: 100%;
 max-width: 412px;
 background: #ffffff;
 border-radius: 32px;
 box-shadow: 0 20px 50px rgba(140, 118, 98, 0.12);
 overflow: hidden;
 position: relative;
 min-height: 720px;
 border: 1px solid rgba(235, 220, 203, 0.6);
 display: flex;
 flex-direction: column;
 }

 /* HEADER: Menggunakan Flexbox modern */
 header {
 background: #ffffff;
 padding: 20px 24px;
 border-bottom: 1px solid #f3ece4;
 position: relative;
 z-index: 10;
 }

 .header-content {
 display: flex;
 justify-content: space-between;
 align-items: center;
 }

 .logo-text {
 font-size: 20px;
 font-weight: 800;
 color: #614e4d;
 letter-spacing: -0.5px;
 }

 .logo-text span {
 color: #dca842;
 font-weight: 400;
 }

 .profile-section {
 display: flex;
 align-items: center;
 gap: 10px;
 }

 .user-name {
 font-size: 13px;
 font-weight: 600;
 color: #7a6968;
 }

 .avatar-container {
 width: 38px;
 height: 38px;
 border-radius: 50%;
 border: 2px solid #eec87d;
 overflow: hidden;
 background: #ebdccb;
 box-shadow: 0 2px 8px rgba(220, 168, 66, 0.15);
 }

 .avatar-img {
 width: 100%;
 height: 100%;
 object-fit: cover;
 }

 /* CONTENT AREA & HERO BANNER */
 .hero-banner {
 width: 100%;
 height: 160px;
 background: url('https://mahiru.web.id/image/file_1782447434194.jpg') no-repeat center center;
 background-size: cover;
 position: relative;
 }

 .hero-overlay {
 position: absolute;
 bottom: 0;
 left: 0;
 right: 0;
 height: 60%;
 background: linear-gradient(to top, #ffffff, transparent);
 }

 .content-area {
 position: relative;
 padding: 10px 24px 24px 24px;
 flex: 1;
 display: flex;
 flex-direction: column;
 }

 .section-title {
 font-size: 15px;
 font-weight: 700;
 color: #614e4d;
 margin-bottom: 14px;
 letter-spacing: 0.3px;
 }

 /* AREA UPLOAD CARD (ZONA DROP) */
 .upload-card {
 background: #fdfbf9;
 border: 2px dashed #eec87d;
 border-radius: 20px;
 padding: 32px 20px;
 text-align: center;
 margin-bottom: 24px;
 position: relative;
 cursor: pointer;
 transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
 overflow: hidden;
 }

 .upload-card:hover {
 background: #fbf8f3;
 border-color: #dca842;
 transform: translateY(-2px);
 }

 .cloud-icon {
 width: 48px;
 height: 48px;
 margin: 0 auto 14px;
 transition: transform 0.3s ease;
 }

 .upload-card:hover .cloud-icon {
 transform: translateY(-4px);
 }

 .upload-hint {
 font-size: 14px;
 font-weight: 600;
 color: #7a6968;
 margin-bottom: 16px;
 }

 .btn-choose {
 background: linear-gradient(135deg, #8cb3dd 0%, #638cb8 100%);
 color: white;
 border: none;
 padding: 10px 24px;
 border-radius: 30px;
 font-size: 13px;
 font-weight: 600;
 box-shadow: 0 4px 15px rgba(99, 140, 184, 0.3);
 display: inline-block;
 transition: opacity 0.2s;
 }

 .btn-choose:hover {
 opacity: 0.9;
 }

 .upload-limit {
 font-size: 11px;
 color: #a89694;
 margin-top: 14px;
 font-weight: 500;
 letter-spacing: 0.5px;
 }

 /* DEKORASI SAYAP/BULU MAHIRU (ANGEL) */
 .feather-left, .feather-right {
 position: absolute;
 bottom: -5px;
 width: 32px;
 opacity: 0.12;
 pointer-events: none;
 transition: all 0.3s;
 }
 .feather-left { left: 10px; transform: rotate(-15deg); }
 .feather-right { right: 10px; transform: rotate(15deg); }
 .upload-card:hover .feather-left { transform: rotate(-25deg) scale(1.1); opacity: 0.2; }
 .upload-card:hover .feather-right { transform: rotate(25deg) scale(1.1); opacity: 0.2; }

 /* KOTAK HASIL TAUTAN */
 .result-card {
 background: #f4f8fc;
 border: 1px solid #d3e2f2;
 border-radius: 16px;
 padding: 16px;
 margin-bottom: 24px;
 display: none;
 animation: fadeIn 0.3s ease forwards;
 }

 @keyframes fadeIn {
 from { opacity: 0; transform: translateY(8px); }
 to { opacity: 1; transform: translateY(0); }
 }

 .result-label {
 font-size: 12px;
 font-weight: 700;
 color: #4b6b94;
 margin-bottom: 8px;
 display: block;
 }

 .input-group {
 display: flex;
 gap: 8px;
 }

 .link-input {
 flex: 1;
 background: #ffffff;
 border: 1px solid #cedee8;
 padding: 10px 14px;
 border-radius: 10px;
 font-size: 13px;
 color: #3b526d;
 outline: none;
 }

 .btn-copy {
 background: #638cb8;
 color: white;
 border: none;
 padding: 0 16px;
 border-radius: 10px;
 font-size: 12px;
 font-weight: 600;
 cursor: pointer;
 transition: background 0.2s;
 }

 .btn-copy:hover {
 background: #4f749c;
 }

 /* NAVIGASI GALERI */
 .btn-navigation {
 width: 100%;
 background: #ffffff;
 border: 1px solid #ebdccb;
 color: #8c736b;
 padding: 14px;
 border-radius: 16px;
 font-size: 13px;
 font-weight: 600;
 display: flex;
 align-items: center;
 justify-content: center;
 gap: 10px;
 cursor: pointer;
 box-shadow: 0 4px 10px rgba(140, 115, 107, 0.04);
 text-decoration: none;
 transition: all 0.2s;
 margin-top: auto; /* Mendorong footer ke paling bawah */
 }

 .btn-navigation:hover {
 background: #fdfbf9;
 border-color: #dca842;
 color: #dca842;
 }

 footer {
 text-align: center;
 font-size: 11px;
 color: #a89694;
 font-weight: 500;
 line-height: 1.5;
 padding-top: 24px;
 }

 #file-input {
 display: none;
 }
 </style>
</head>
<body>

<div class="mobile-container">
 <header>
 <div class="header-content">
 <div class="logo-section">
 <div class="logo-text">Angel<span>Share</span></div>
 </div>
 <div class="profile-section">
 <span class="user-name">Mahiru Shiina</span>
 <div class="avatar-container">
 <img class="avatar-img" src="https://mahiru.web.id/image/file_1782447445629.jpg" alt="Mahiru Shiina">
 </div>
 </div>
 </div>
 </header>

 <!-- Gambar Mahiru dipindah ke sini agar kontras dan tidak menutupi teks form -->
 <div class="hero-banner">
 <div class="hero-overlay"></div>
 </div>

 <div class="content-area">
 <div class="section-title">Unggah File Baru</div>
 
 <div class="upload-card" id="drop-zone" onclick="document.getElementById('file-input').click()">
 <svg class="feather-left" viewBox="0 0 24 24" fill="#eec87d"><path d="M2,21A19.94,19.94,0,0,0,18,13a11.45,11.45,0,0,1-6-2A17.1,17.1,0,0,0,2,21Z"/></svg>
 <svg class="feather-right" viewBox="0 0 24 24" fill="#eec87d"><path d="M22,21A19.94,19.94,0,0,1,6,13a11.45,11.45,0,0,0,6-2A17.1,17.1,0,0,1,22,21Z"/></svg>

 <svg class="cloud-icon" viewBox="0 0 64 64" fill="none" stroke="#638cb8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
 <path d="M18 40a12 12 0 1 1 11.6-16A16 16 0 1 1 52 32c0 4.4-3.6 8-8 8H18z"/>
 </svg>
 
 <div class="upload-hint" id="upload-status-text">Ketuk atau Seret File Ke Sini</div>
 
 <span class="btn-choose">PILIH BERKAS</span>
 <input type="file" id="file-input" onchange="fileSelected(this)">
 
 <div class="upload-limit">UKURAN MAKSIMAL 50MB</div>
 </div>

 <div class="result-card" id="resultBox">
 <span class="result-label" id="statusLabel">Tautan Berhasil Dibuat:</span>
 <div class="input-group">
 <input type="text" class="link-input" id="linkResult" readonly value="">
 <button class="btn-copy" onclick="copyGeneratedLink()">SALIN</button>
 </div>
 </div>
 
 <a href="/list" class="btn-navigation">
 <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M4.5 2A2.5 2.5 0 0 0 2 4.5v7A2.5 2.5 0 0 0 4.5 14h7a2.5 2.5 0 0 0 2.5-2.5v-7A2.5 2.5 0 0 0 11.5 2h-7zM3 4.5A1.5 1.5 0 0 1 4.5 3h7A1.5 1.5 0 0 1 13 4.5v7a1.5 1.5 0 0 1-1.5 1.5h-7A1.5 1.5 0 0 1 3 12.5v-7zM10.5 5a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1zM4 11l2.5-3.25L8 9.5l3-4L12 11H4z"/></svg>
 LIHAT SEMUA GAMBAR (./image/)
 </a>

 <footer>
 Ditenagai oleh Vercel Serverless & GitHub API<br>&copy; 2026 AngelShare Inc.
 </footer>
 </div>
</div>

<script>
 let base64File = null;
 let selectedFileName = "";

 const dropZone = document.getElementById('drop-zone');
 
 dropZone.addEventListener('dragover', (e) => { 
 e.preventDefault(); 
 e.stopPropagation();
 dropZone.style.borderColor = '#dca842'; 
 dropZone.style.background = '#fbf8f3';
 });
 
 dropZone.addEventListener('dragleave', (e) => { 
 e.preventDefault();
 e.stopPropagation();
 dropZone.style.borderColor = '#eec87d'; 
 dropZone.style.background = '#fdfbf9';
 });
 
 dropZone.addEventListener('drop', (e) => {
 e.preventDefault();
 e.stopPropagation();
 dropZone.style.borderColor = '#eec87d';
 dropZone.style.background = '#fdfbf9';
 const files = e.dataTransfer.files;
 if(files.length > 0) {
 document.getElementById('file-input').files = files;
 fileSelected(document.getElementById('file-input'));
 }
 });

 function fileSelected(input) {
 if(input.files.length === 0) return;
 const file = input.files[0];
 selectedFileName = file.name;
 
 const reader = new FileReader();
 reader.readAsDataURL(file);
 reader.onload = () => {
 base64File = reader.result;
 const statusText = document.getElementById('upload-status-text');
 statusText.innerText = file.name.length > 25 ? file.name.substring(0, 22) + "..." : file.name;
 statusText.style.color = '#3b526d';
 prosesUpload();
 };
 }

 async function prosesUpload() {
 if (!base64File) return alert('Pilih filenya dulu, Bre!');
 
 const resBox = document.getElementById('resultBox');
 const linkRes = document.getElementById('linkResult');
 
 linkRes.value = "Menghubungkan ke Mahiru Cloud...";
 resBox.style.display = "block";

 try {
 const response = await fetch('/api/upload', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ image: base64File, filename: selectedFileName })
 });
 const data = await response.json();
 if (data.url) {
 linkRes.value = window.location.origin + data.url;
 } else {
 alert('Gagal mengunggah berkas: ' + data.error);
 resBox.style.display = "none";
 }
 } catch (err) {
 alert('Eror koneksi server API.');
 resBox.style.display = "none";
 }
 }

 function copyGeneratedLink() {
 const linkRes = document.getElementById('linkResult');
 if(!linkRes.value || linkRes.value.startsWith("Menghubungkan")) return;
 
 linkRes.select();
 linkRes.setSelectionRange(0, 99999);
 
 navigator.clipboard.writeText(linkRes.value).then(() => {
 alert('📋 Tautan sukses disalin ke clipboard!');
 }).catch(() => {
 alert('Gagal menyalin otomatis.');
 });
 }
</script>
</body>
</html>
