<!DOCTYPE html>
<html lang="id">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>AngelShare - Premium Uploader</title>
 <style>
 * {
 box-sizing: border-box;
 margin: 0;
 padding: 0;
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
 }

 body {
 background-color: #f7f1eb;
 color: #5a4e45;
 display: flex;
 justify-content: center;
 align-items: flex-start;
 min-height: 100vh;
 padding: 16px 8px;
 }

 /* CONTAINER UTAMA: Efek ponsel modern dengan border subtle */
 .mobile-container {
 width: 100%;
 max-width: 412px;
 background: #ffffff url('https://mahiru.web.id/image/file_1782447434194.jpg') no-repeat center center;
 background-size: cover;
 border-radius: 36px;
 box-shadow: 0 20px 50px rgba(90, 78, 69, 0.18);
 overflow: hidden;
 display: block;
 position: relative;
 min-height: 840px;
 border: 6px solid rgba(255, 255, 255, 0.8);
 }

 /* OVERLAY: Gradasi transparan super halus agar teks terbaca sempurna */
 .background-overlay {
 position: absolute;
 top: 0;
 left: 0;
 right: 0;
 bottom: 0;
 background: linear-gradient(180deg, rgba(255, 255, 255, 0.5) 0%, rgba(253, 251, 247, 0.75) 100%);
 z-index: 1;
 pointer-events: none;
 }

 header {
 background: rgba(255, 255, 255, 0.75);
 backdrop-filter: blur(12px);
 -webkit-backdrop-filter: blur(12px);
 padding: 20px 18px;
 border-bottom: 1px solid rgba(235, 220, 203, 0.5);
 position: relative;
 z-index: 10;
 }

 .header-content {
 display: flex;
 justify-content: space-between;
 align-items: center;
 }

 .logo-text {
 font-size: 24px;
 font-weight: 800;
 color: #735d49;
 letter-spacing: -0.8px;
 }

 .logo-text span {
 color: #d4af37;
 font-weight: 300;
 }

 .profile-section {
 display: flex;
 align-items: center;
 gap: 10px;
 }

 .user-name {
 font-size: 13px;
 font-weight: 700;
 color: #735d49;
 }

 .avatar-container {
 width: 38px;
 height: 38px;
 border-radius: 50%;
 border: 2px solid rgba(212, 175, 55, 0.6);
 overflow: hidden;
 box-shadow: 0 4px 10px rgba(0,0,0,0.05);
 }

 .avatar-img {
 width: 100%;
 height: 100%;
 object-fit: cover;
 }

 .content-area {
 position: relative;
 z-index: 5;
 padding: 28px 20px;
 }

 .section-title {
 font-size: 15px;
 font-weight: 700;
 color: #5a4e45;
 margin-bottom: 14px;
 letter-spacing: 0.3px;
 text-transform: uppercase;
 opacity: 0.9;
 display: flex;
 align-items: center;
 gap: 6px;
 }

 .section-title::before {
 content: '';
 display: inline-block;
 width: 4px;
 height: 14px;
 background: #d4af37;
 border-radius: 2px;
 }

 /* AREA STRUKTUR UPLOAD CARD (Premium Glassmorphism) */
 .upload-card {
 background: rgba(255, 255, 255, 0.45);
 backdrop-filter: blur(16px);
 -webkit-backdrop-filter: blur(16px);
 border: 2px dashed rgba(212, 175, 55, 0.4);
 border-radius: 28px;
 padding: 45px 20px;
 text-align: center;
 margin-bottom: 24px;
 position: relative;
 cursor: pointer;
 box-shadow: 0 10px 30px rgba(140, 118, 98, 0.04);
 transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
 }

 .upload-card:hover, .upload-card:active {
 background: rgba(255, 255, 255, 0.7);
 border-color: #d4af37;
 transform: translateY(-2px);
 box-shadow: 0 15px 35px rgba(140, 118, 98, 0.08);
 }

 .cloud-icon {
 width: 64px;
 height: 64px;
 margin: 0 auto 16px;
 transition: transform 0.3s ease;
 }

 .upload-card:hover .cloud-icon {
 transform: scale(1.08);
 }

 .upload-hint {
 font-size: 15px;
 font-weight: 700;
 color: #735d49;
 margin-bottom: 18px;
 }

 .btn-choose {
 background: linear-gradient(135deg, #8baecf 0%, #6488b3 100%);
 color: white;
 border: none;
 padding: 12px 32px;
 border-radius: 24px;
 font-size: 13px;
 font-weight: 700;
 letter-spacing: 0.5px;
 box-shadow: 0 6px 16px rgba(100, 136, 179, 0.3);
 display: inline-block;
 transition: all 0.2s;
 }

 .upload-card:hover .btn-choose {
 box-shadow: 0 8px 20px rgba(100, 136, 179, 0.45);
 }

 .upload-limit {
 font-size: 11px;
 color: #9c8a7c;
 margin-top: 18px;
 font-weight: 600;
 }

 /* TAUTAN HASIL GENERATE (Result Card Modern) */
 .result-card {
 background: rgba(255, 255, 255, 0.85);
 backdrop-filter: blur(10px);
 -webkit-backdrop-filter: blur(10px);
 border: 1px solid rgba(212, 175, 55, 0.3);
 border-radius: 22px;
 padding: 18px;
 margin-bottom: 24px;
 display: none;
 box-shadow: 0 10px 25px rgba(90, 78, 69, 0.06);
 animation: fadeIn 0.4s ease forwards;
 }

 @keyframes fadeIn {
 from { opacity: 0; transform: translateY(10px); }
 to { opacity: 1; transform: translateY(0); }
 }

 .result-label {
 font-size: 12px;
 font-weight: 800;
 color: #8c7662;
 margin-bottom: 10px;
 display: block;
 }

 .input-group {
 display: flex;
 background: #ffffff;
 border: 1px solid #ebdccb;
 border-radius: 16px;
 padding: 4px;
 align-items: center;
 }

 .link-input {
 flex: 1;
 border: none;
 background: transparent;
 padding: 10px 14px;
 font-size: 13px;
 color: #4a3e35;
 font-weight: 600;
 outline: none;
 min-width: 0;
 }

 .btn-copy {
 background: #7da0ca;
 color: white;
 border: none;
 padding: 10px 20px;
 border-radius: 12px;
 font-size: 12px;
 font-weight: 700;
 cursor: pointer;
 transition: all 0.2s;
 }

 .btn-copy:active {
 background: #6488b3;
 transform: scale(0.97);
 }

 /* TOMBOL NAVIGASI UTAMA KE HALAMAN LIST.HTML */
 .btn-navigation {
 width: 100%;
 background: rgba(255, 255, 255, 0.6);
 backdrop-filter: blur(8px);
 -webkit-backdrop-filter: blur(8px);
 border: 1px solid rgba(235, 220, 203, 0.8);
 color: #735d49;
 padding: 16px;
 border-radius: 22px;
 font-size: 14px;
 font-weight: 700;
 display: flex;
 align-items: center;
 justify-content: center;
 gap: 12px;
 cursor: pointer;
 box-shadow: 0 6px 16px rgba(90, 78, 69, 0.04);
 text-decoration: none;
 transition: all 0.2s ease;
 }

 .btn-navigation:hover {
 background: #ffffff;
 border-color: #ebdccb;
 color: #5a4e45;
 transform: translateY(-1px);
 box-shadow: 0 8px 20px rgba(90, 78, 69, 0.08);
 }

 .feather-left, .feather-right {
 position: absolute;
 width: 26px;
 opacity: 0.15;
 pointer-events: none;
 }
 .feather-left { left: 20px; top: 25%; transform: rotate(-15deg); }
 .feather-right { right: 20px; bottom: 25%; transform: rotate(35deg); }

 footer {
 text-align: center;
 font-size: 11px;
 color: #9c8a7c;
 font-weight: 600;
 padding: 30px 10px 10px;
 line-height: 1.6;
 }

 #file-input {
 display: none;
 }
 </style>
</head>
<body>

<div class="mobile-container">
 <div class="background-overlay"></div>

 <header>
 <div class="header-content">
 <div class="logo-section">
 <div class="logo-text">Angel<span>Share</span></div>
 </div>
 <div class="profile-section">
 <span class="user-name">Mahiru Shiina</span>
 <div class="avatar-container">
 <img class="avatar-img" src="https://mahiru.web.id/image/file_1782447445629.jpg" alt="Mahiru Shiina">
 </div>
 </div>
 </div>
 </header>

 <div class="content-area">
 <div class="section-title">Unggah File Baru</div>
 
 <div class="upload-card" id="drop-zone" onclick="document.getElementById('file-input').click()">
 <svg class="feather-left" viewBox="0 0 24 24" fill="#d4af37"><path d="M2,21A19.94,19.94,0,0,0,18,13a11.45,11.45,0,0,1-6-2A17.1,17.1,0,0,0,2,21Z"/></svg>
 <svg class="feather-right" viewBox="0 0 24 24" fill="#d4af37"><path d="M22,21A19.94,19.94,0,0,1,6,13a11.45,11.45,0,0,0,6-2A17.1,17.1,0,0,1,22,21Z"/></svg>

 <svg class="cloud-icon" viewBox="0 0 64 64" fill="none" stroke="#7da0ca" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
 <path d="M18 40a12 12 0 1 1 11.6-16A16 16 0 1 1 52 32c0 4.4-3.6 8-8 8H18z"/>
 </svg>
 
 <div class="upload-hint" id="upload-status-text">Ketuk atau Seret File Ke Sini</div>
 
 <span class="btn-choose">PILIH BERKAS</span>
 <input type="file" id="file-input" onchange="fileSelected(this)">
 
 <div class="upload-limit">UKURAN MAKSIMAL 50MB</div>
 </div>

 <!-- GENERATE LINK AREA -->
 <div class="result-card" id="resultBox">
 <span class="result-label" id="statusLabel">TAUTAN BERHASIL GENERATE</span>
 <div class="input-group">
 <input type="text" class="link-input" id="linkResult" readonly value="">
 <button class="btn-copy" onclick="copyGeneratedLink()">SALIN</button>
 </div>
 </div>

 <div class="section-title">Navigasi Galeri</div>
 
 <!-- BUTTON LIHAT SEMUA GAMBAR -->
 <a href="/list" class="btn-navigation">
 <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
 <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
 <path d="M12 8v8M8 12h8"/>
 </svg>
 LIHAT SEMUA GAMBAR (./image/)
 </a>

 <footer>
 Ditenagai oleh Vercel Serverless & GitHub API<br>&copy; 2026 AngelShare Inc. All Rights Reserved.
 </footer>
 </div>
</div>

<script>
 let base64File = null;
 let selectedFileName = "";

 const dropZone = document.getElementById('drop-zone');
 
 dropZone.addEventListener('dragover', (e) => { 
 e.preventDefault(); 
 e.stopPropagation();
 dropZone.style.background = 'rgba(255, 255, 255, 0.75)';
 dropZone.style.borderColor = '#d4af37'; 
 });
 
 dropZone.addEventListener('dragleave', (e) => { 
 e.preventDefault();
 e.stopPropagation();
 dropZone.style.background = 'rgba(255, 255, 255, 0.45)';
 dropZone.style.borderColor = 'rgba(212, 175, 55, 0.4)'; 
 });
 
 dropZone.addEventListener('drop', (e) => {
 e.preventDefault();
 e.stopPropagation();
 dropZone.style.background = 'rgba(255, 255, 255, 0.45)';
 dropZone.style.borderColor = 'rgba(212, 175, 55, 0.4)';
 const files = e.dataTransfer.files;
 if(files.length > 0) {
 document.getElementById('file-input').files = files;
 fileSelected(document.getElementById('file-input'));
 }
 });

 function fileSelected(input) {
 if(input.files.length === 0) return;
 const file = input.files[0];
 selectedFileName = file.name;
 
 const reader = new FileReader();
 reader.readAsDataURL(file);
 reader.onload = () => {
 base64File = reader.result;
 const statusText = document.getElementById('upload-status-text');
 statusText.innerText = file.name.length > 22 ? file.name.substring(0, 19) + "..." : file.name;
 statusText.style.color = '#6488b3';
 
 prosesUpload();
 };
 }

 async function prosesUpload() {
 if (!base64File) return alert('Pilih filenya dulu, Bre!');
 
 const resBox = document.getElementById('resultBox');
 const linkRes = document.getElementById('linkResult');
 
 linkRes.value = "Menghubungkan ke server...";
 resBox.style.display = "block";

 try {
 const response = await fetch('/api/upload', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ image: base64File, filename: selectedFileName })
 });
 const data = await response.json();
 if (data.url) {
 linkRes.value = window.location.origin + data.url;
 } else {
 alert('Gagal mengunggah: ' + data.error);
 resBox.style.display = "none";
 }
 } catch (err) {
 alert('Eror koneksi API backend.');
 resBox.style.display = "none";
 }
 }

 function copyGeneratedLink() {
 const linkRes = document.getElementById('linkResult');
 if(!linkRes.value || linkRes.value.startsWith("Menghubungkan")) return;
 
 linkRes.select();
 linkRes.setSelectionRange(0, 99999);
 
 navigator.clipboard.writeText(linkRes.value).then(() => {
 alert('📋 Sukses menyalin tautan!');
 }).catch(() => {
 alert('Gagal menyalin otomatis.');
 });
 }
</script>
</body>
</html>
