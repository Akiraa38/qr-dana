<!DOCTYPE html>
<html lang="id">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Mahiru Cloud - Uploader</title>
 <style>
 * {
 box-sizing: border-box;
 margin: 0;
 padding: 0;
 font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
 }

 body {
 background-color: #f4eae1;
 color: #5a4e45;
 display: flex;
 justify-content: center;
 align-items: flex-start;
 min-height: 100vh;
 padding: 10px;
 }

 /* CONTAINER UTAMA: Gambar latar belakang disesuaikan penuh */
 .mobile-container {
 width: 100%;
 max-width: 412px;
 background: #ffffff url('https://mahiru.web.id/image/file1782447434194.jpg') no-repeat center center;
 background-size: cover;
 border-radius: 30px;
 box-shadow: 0 12px 35px rgba(90, 78, 69, 0.15);
 overflow: hidden;
 display: block;
 position: relative;
 min-height: 840px;
 border: 4px solid #ebdccb;
 }

 /* OVERLAY: Agar tulisan di atas background tetap kontras dan terbaca */
 .background-overlay {
 position: absolute;
 top: 0;
 left: 0;
 right: 0;
 bottom: 0;
 background: rgba(255, 255, 255, 0.65);
 z-index: 1;
 pointer-events: none;
 }

 header {
 background: rgba(251, 247, 240, 0.9);
 backdrop-filter: blur(5px);
 padding: 16px;
 border-bottom: 1px solid rgba(235, 220, 203, 0.7);
 display: block;
 position: relative;
 z-index: 10;
 }

 .header-content {
 display: table;
 width: 100%;
 }

 .logo-section {
 display: table-cell;
 vertical-align: middle;
 }

 .logo-text {
 font-size: 22px;
 font-weight: 700;
 color: #8c7662;
 letter-spacing: -0.5px;
 }

 .logo-text span {
 color: #d4af37;
 font-weight: 300;
 }

 .profile-section {
 display: table-cell;
 vertical-align: middle;
 text-align: right;
 }

 .avatar-container {
 width: 42px;
 height: 42px;
 border-radius: 50%;
 border: 2px solid #d4af37;
 display: inline-block;
 vertical-align: middle;
 overflow: hidden;
 background: #ebdccb;
 box-shadow: 0 2px 5px rgba(0,0,0,0.1);
 }

 .avatar-img {
 width: 100%;
 height: 100%;
 object-fit: cover;
 object-position: center;
 }

 .user-name {
 font-size: 13px;
 font-weight: 600;
 color: #7a695a;
 margin-right: 8px;
 display: inline-block;
 vertical-align: middle;
 }

 .content-area {
 position: relative;
 z-index: 5;
 padding: 24px 16px;
 }

 .section-title {
 font-size: 16px;
 font-weight: 600;
 color: #6e5d4f;
 margin-bottom: 12px;
 padding-left: 6px;
 border-left: 3px solid #d4af37;
 line-height: 1;
 }

 /* AREA STRUKTUR UPLOAD CARD */
 .upload-card {
 background: rgba(255, 255, 255, 0.65);
 backdrop-filter: blur(4px);
 -webkit-backdrop-filter: blur(4px);
 border: 2px dashed rgba(212, 175, 55, 0.6);
 border-radius: 24px;
 padding: 35px 20px;
 text-align: center;
 margin-bottom: 20px;
 position: relative;
 box-shadow: 0 8px 20px rgba(140, 118, 98, 0.05);
 transition: all 0.3s ease;
 }

 .cloud-icon {
 width: 56px;
 height: 56px;
 margin: 0 auto 12px;
 opacity: 0.9;
 display: block;
 }

 .upload-hint {
 font-size: 14px;
 font-weight: 700;
 color: #8c7662;
 letter-spacing: 1px;
 margin-bottom: 16px;
 text-transform: uppercase;
 }

 .btn-choose {
 background: linear-gradient(135deg, #7da0ca 0%, #6488b3 100%);
 color: white;
 border: none;
 padding: 11px 28px;
 border-radius: 20px;
 font-size: 13px;
 font-weight: 600;
 box-shadow: 0 4px 12px rgba(100, 136, 179, 0.35);
 display: inline-block;
 cursor: pointer;
 text-decoration: none;
 }

 .upload-limit {
 font-size: 11px;
 color: #8c7662;
 margin-top: 14px;
 font-weight: 600;
 }

 /* KOTAK HASIL GENERATE TAUTAN (ResultBox Asli) */
 .result-card {
 background: rgba(255, 255, 255, 0.85);
 border: 1px solid #ebdccb;
 border-radius: 20px;
 padding: 16px;
 margin-bottom: 24px;
 display: none; /* Dikontrol via JavaScript */
 box-shadow: 0 6px 15px rgba(0,0,0,0.05);
 }

 .result-label {
 font-size: 12px;
 font-weight: 700;
 color: #8c7662;
 margin-bottom: 8px;
 display: block;
 }

 .input-group {
 display: flex;
 gap: 8px;
 }

 .link-input {
 flex: 1;
 background: #fcf9f5;
 border: 1px solid #ebdccb;
 padding: 10px 14px;
 border-radius: 12px;
 font-size: 13px;
 color: #5a4e45;
 outline: none;
 }

 .btn-copy {
 background: #7da0ca;
 color: white;
 border: none;
 padding: 0 16px;
 border-radius: 12px;
 font-size: 12px;
 font-weight: 600;
 cursor: pointer;
 }

 .btn-copy:active {
 background: #6488b3;
 }

 /* TOMBOL NAVIGASI UTAMA KE HALAMAN LIST.HTML */
 .btn-navigation {
 width: 100%;
 background: rgba(251, 247, 240, 0.9);
 border: 1px solid #ebdccb;
 color: #8c7662;
 padding: 14px;
 border-radius: 18px;
 font-size: 13px;
 font-weight: 700;
 display: flex;
 align-items: center;
 justify-content: center;
 gap: 10px;
 cursor: pointer;
 box-shadow: 0 4px 12px rgba(90, 78, 69, 0.08);
 text-decoration: none;
 transition: all 0.2s;
 margin-top: 10px;
 }

 .btn-navigation:hover {
 background: #ebdccb;
 color: #5a4e45;
 }

 .feather-left {
 position: absolute;
 left: 15px;
 top: 50%;
 transform: translateY(-50%) rotate(-15deg);
 width: 24px;
 opacity: 0.25;
 }

 .feather-right {
 position: absolute;
 right: 15px;
 top: 42%;
 transform: translateY(-50%) rotate(35deg);
 width: 24px;
 opacity: 0.25;
 }

 footer {
 text-align: center;
 font-size: 11px;
 color: #8c7662;
 font-weight: 500;
 padding: 24px 10px 10px;
 margin-top: 15px;
 }

 #file-input {
 display: none;
 }
 </style>
</head>
<body>

<div class="mobile-container">
 <div class="background-overlay"></div>

 <header>
 <div class="header-content">
 <div class="logo-section">
 <div class="logo-text">Angel<span>Share</span></div>
 </div>
 <div class="profile-section">
 <span class="user-name">Mahiru Shina</span>
 <div class="avatar-container">
 <img class="avatar-img" src="https://mahiru.web.id/image/file_1782447445629.jpg" alt="Mahiru Shiina">
 </div>
 </div>
 </div>
 </header>

 <div class="content-area">
 <div class="section-title">Unggah File Baru</div>
 
 <div class="upload-card" id="drop-zone" onclick="document.getElementById('file-input').click()">
 <svg class="feather-left" viewBox="0 0 24 24" fill="#d4af37"><path d="M2,21A19.94,19.94,0,0,0,18,13a11.45,11.45,0,0,1-6-2A17.1,17.1,0,0,0,2,21Z"/></svg>
 <svg class="feather-right" viewBox="0 0 24 24" fill="#d4af37"><path d="M22,21A19.94,19.94,0,0,1,6,13a11.45,11.45,0,0,0,6-2A17.1,17.1,0,0,1,22,21Z"/></svg>

 <svg class="cloud-icon" viewBox="0 0 64 64" fill="none" stroke="#7da0ca" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
 <path d="M18 40a12 12 0 1 1 11.6-16A16 16 0 1 1 52 32c0 4.4-3.6 8-8 8H18z"/>
 </svg>
 
 <div class="upload-hint" id="upload-status-text">Ketuk atau Seret File Ke Sini</div>
 
 <label type="button" class="btn-choose">PILIH BERKAS</label>
 <input type="file" id="file-input" onchange="fileSelected(this)">
 
 <div class="upload-limit">UKURAN MAKSIMAL 50MB</div>
 </div>

 <div class="result-card" id="resultBox">
 <span class="result-card-label" id="statusLabel" style="font-size: 12px; font-weight:700; margin-bottom:6px; display:block;">Tautan Berhasil Dibuat:</span>
 <div class="input-group">
 <input type="text" class="link-input" id="linkResult" readonly value="">
 <button class="btn-copy" onclick="copyGeneratedLink()">SALIN</button>
 </div>
 </div>

 <div class="section-title">Navigasi Galeri</div>
 
 <a href="/list" class="btn-navigation">
 <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M4.5 2A2.5 2.5 0 0 0 2 4.5v7A2.5 2.5 0 0 0 4.5 14h7a2.5 2.5 0 0 0 2.5-2.5v-7A2.5 2.5 0 0 0 11.5 2h-7zM3 4.5A1.5 1.5 0 0 1 4.5 3h7A1.5 1.5 0 0 1 13 4.5v7a1.5 1.5 0 0 1-1.5 1.5h-7A1.5 1.5 0 0 1 3 12.5v-7zM10.5 5a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1zM4 11l2.5-3.25L8 9.5l3-4L12 11H4z"/></svg>
 LIHAT SEMUA GAMBAR (./image)
 </a>

 <footer>
 ©Github Akiraxxc<br>&copy; 2026 MahiruShina Inc.
 </footer>
 </div>
</div>

<script>
 let base64File = null;
 let selectedFileName = "";

 // Fungsi Drop Zone Drag & Drop Handler Asli Proyek Lo
 const dropZone = document.getElementById('drop-zone');
 
 dropZone.addEventListener('dragover', (e) => { 
 e.preventDefault(); 
 e.stopPropagation();
 dropZone.style.borderColor = '#d4af37'; 
 });
 
 dropZone.addEventListener('dragleave', (e) => { 
 e.preventDefault();
 e.stopPropagation();
 dropZone.style.borderColor = 'rgba(212, 175, 55, 0.6)'; 
 });
 
 dropZone.addEventListener('drop', (e) => {
 e.preventDefault();
 e.stopPropagation();
 dropZone.style.borderColor = 'rgba(212, 175, 55, 0.6)';
 const files = e.dataTransfer.files;
 if(files.length > 0) {
 document.getElementById('file-input').files = files;
 fileSelected(document.getElementById('file-input'));
 }
 });

 // Menangani pembacaan file lokal (FileReader)
 function fileSelected(input) {
 if(input.files.length === 0) return;
 const file = input.files[0];
 selectedFileName = file.name;
 
 const reader = new FileReader();
 reader.readAsDataURL(file);
 reader.onload = () => {
 base64File = reader.result;
 const statusText = document.getElementById('upload-status-text');
 statusText.innerText = file.name.length > 25 ? file.name.substring(0, 22) + "..." : file.name;
 statusText.style.color = '#6488b3';
 
 // Otomatis trigger proses unggah ketika file selesai dipilih
 prosesUpload();
 };
 }

 // Mengirim file ke backend endpoint /api/upload lo untuk di simpan ke folder ./image/
 async function prosesUpload() {
 if (!base64File) return alert('Pilih filenya dulu, Bre!');
 
 const resBox = document.getElementById('resultBox');
 const linkRes = document.getElementById('linkResult');
 
 linkRes.value = "Menghubungkan ke Mahiru Cloud...";
 resBox.style.display = "block";

 try {
 const response = await fetch('/api/upload', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ image: base64File, filename: selectedFileName })
 });
 const data = await response.json();
 if (data.url) {
 // Menampilkan link download/view penuh yang digenerate oleh serverless lo
 linkRes.value = window.location.origin + data.url;
 } else {
 alert('Gagal mengunggah berkas: ' + data.error);
 resBox.style.display = "none";
 }
 } catch (err) {
 alert('Eror koneksi server API.');
 resBox.style.display = "none";
 }
 }

 // Menyalin isi linkResult langsung ke clipboard internal HP/Browser
 function copyGeneratedLink() {
 const linkRes = document.getElementById('linkResult');
 if(!linkRes.value || linkRes.value.startsWith("Menghubungkan")) return;
 
 linkRes.select();
 linkRes.setSelectionRange(0, 99999); // Untuk perangkat mobile
 
 navigator.clipboard.writeText(linkRes.value).then(() => {
 alert(' Tautan sukses disalin ke clipboard!');
 }).catch(() => {
 alert('Gagal menyalin otomatis.');
 });
 }
</script>
</body>
</html>
