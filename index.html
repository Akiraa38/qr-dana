<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahiru Cloud - Upload</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #151d30;
            --accent: #00adb5;
            --text-main: #ffffff;
            --text-muted: #64748b;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .container { width: 100%; max-width: 450px; background: var(--bg-card); border-radius: 12px; overflow: hidden; border: 1px solid #1e294b; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
        
        /* Gambar Banner Rasio 16:4 Otomatis */
        .banner { width: 100%; aspect-ratio: 16 / 4; display: block; object-fit: cover; object-position: center; border-bottom: 1px solid #1e294b; }
        
        .content { padding: 30px 20px; }
        h3 { margin: 0 0 5px 0; font-size: 22px; color: var(--text-main); }
        p { margin: 0 0 25px 0; font-size: 14px; color: var(--text-muted); }
        
        .upload-area { border: 2px dashed #1e294b; border-radius: 8px; padding: 30px 20px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; background: #0f172a; }
        .upload-area:hover { border-color: var(--accent); }
        .upload-area svg { width: 40px; height: 40px; fill: var(--text-muted); margin-bottom: 10px; }
        
        .btn { background: var(--accent); color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #008c92; }
        
        .result-box { margin-top: 20px; display: none; background: #0f172a; padding: 15px; border-radius: 6px; border: 1px solid #1e294b; }
        .result-box span { display: block; font-size: 12px; color: var(--accent); font-weight: bold; margin-bottom: 5px; text-align: left; }
        .result-box input { width: 100%; padding: 10px; background: var(--bg-main); border: 1px solid #1e294b; color: #fff; border-radius: 4px; text-align: center; box-sizing: border-box; font-size: 14px; }
        
        .nav-link { display: inline-block; margin-top: 20px; color: var(--text-muted); font-size: 13px; text-decoration: none; transition: 0.2s; }
        .nav-link:hover { color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <img src="https://mahiru.web.id/image/img_1782431885685.jpg" alt="Banner" class="banner">
    
    <div class="content">
        <h3>Upload Image</h3>
        <p>Generate to Link</p>
        
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
            <div style="font-size: 14px; color: var(--text-muted);">Pilih atau seret gambar ke sini</div>
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="fileSelected(this)">
        </div>
        
        <button class="btn" onclick="prosesUpload()">Generate Link</button>
        
        <div class="result-box" id="resultBox">
            <span>🎉 Link Gambar Lo:</span>
            <input type="text" id="linkResult" readonly onclick="this.select()">
        </div>
        
        <a href="/list" class="nav-link">Lihat List Image →</a>
    </div>
</div>

<script>
    let base64File = "";
    let selectedFileName = "";

    function fileSelected(input) {
        if(input.files.length === 0) return;
        const file = input.files[0];
        selectedFileName = file.name;
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => {
            base64File = reader.result;
            document.querySelector('.upload-area div').innerText = file.name;
            document.querySelector('.upload-area div').style.color = '#00adb5';
        };
    }

    async function prosesUpload() {
        if (!base64File) return alert('Pilih gambarnya dulu, Bre!');
        const resBox = document.getElementById('resultBox');
        const linkRes = document.getElementById('linkResult');
        
        linkRes.value = "Lagi diproses...";
        resBox.style.display = "block";

        try {
            const response = await fetch('/api/upload', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: base64File, filename: selectedFileName })
            });
            const data = await response.json();
            if (data.url) {
                linkRes.value = window.location.origin + data.url;
            } else {
                alert('Gagal: ' + data.error);
                resBox.style.display = "none";
            }
        } catch (err) {
            alert('Eror koneksi server.');
            resBox.style.display = "none";
        }
    }
</script>
</body>
</html>
