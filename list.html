<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahiru Cloud - List Images</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #151d30;
            --bg-hover: #1e2942;
            --accent: #00adb5;
            --text-main: #ffffff;
            --text-muted: #64748b;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { color: var(--accent); margin: 0; font-size: 24px; }
        .back-btn { color: var(--text-muted); text-decoration: none; font-size: 14px; }
        .back-btn:hover { color: var(--accent); }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--bg-card); border-radius: 8px; overflow: hidden; border: 1px solid #1e294b; display: flex; flex-direction: column; position: relative; }
        .img-container { width: 100%; height: 150px; background: #0f172a; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-footer { padding: 10px; display: flex; justify-content: space-between; align-items: center; background: #111827; }
        .info-text { font-size: 12px; color: #94a3b8; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; max-width: 120px; }
        
        .menu-container { position: relative; }
        .three-dots { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 0 5px; }
        .dropdown { display: none; position: absolute; right: 0; bottom: 25px; background: #1e293b; border: 1px solid #334155; border-radius: 4px; box-shadow: 0 5px 10px rgba(0,0,0,0.5); z-index: 10; min-width: 110px; }
        .dropdown button { background: none; border: none; color: #e2e8f0; width: 100%; text-align: left; padding: 8px 12px; font-size: 12px; cursor: pointer; }
        .dropdown button:hover { background: var(--accent); color: white; }
        
        #loading { text-align: center; color: var(--accent); font-weight: bold; width: 100%; grid-column: 1/-1; padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Stored Images</h1>
        <a href="/" class="back-btn">← Kembali Upload</a>
    </header>

    <div class="gallery" id="galleryContainer">
        <div id="loading">Memuat daftar gambar...</div>
    </div>
</div>

<script>
    async function loadGallery() {
        try {
            const response = await fetch('/api/list');
            const files = await response.json();
            const container = document.getElementById('galleryContainer');
            container.innerHTML = '';

            if (!Array.isArray(files) || files.length === 0) {
                container.innerHTML = '<div id="loading" style="color:#555">Folder kosong, Bre.</div>';
                return;
            }

            const imageFiles = files.filter(file => file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i));

            imageFiles.forEach(file => {
                const imageUrl = `/image/${file.name}`;
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="img-container"><img src="${imageUrl}" loading="lazy"></div>
                    <div class="card-footer">
                        <div class="info-text" title="${file.name}">${file.name}</div>
                        <div class="menu-container">
                            <button class="three-dots" onclick="toggleDropdown(event, this)">⋮</button>
                            <div class="dropdown">
                                <button onclick="copyLink('${imageUrl}')">📋 Copy Link</button>
                                <button onclick="window.open('${imageUrl}', '_blank')">🖼️ Open</button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            document.addEventListener('click', () => {
                document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
            });
        } catch (err) {
            document.getElementById('galleryContainer').innerHTML = '<div id="loading">Gagal memuat file.</div>';
        }
    }

    function toggleDropdown(event, button) {
        event.stopPropagation();
        document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
        const dropdown = button.nextElementSibling;
        dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    }

    function copyLink(path) {
        const fullUrl = window.location.origin + path;
        navigator.clipboard.writeText(fullUrl);
        alert('📋 Link disalin:\n' + fullUrl);
    }

    loadGallery();
</script>
</body>
</html>
